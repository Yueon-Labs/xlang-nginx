name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  servers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout xlang-nginx
        uses: actions/checkout@v4

      - name: Clone xlang compiler
        run: git clone --depth 1 https://github.com/Yueon-Labs/xlang /tmp/xlang

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build xlangc
        run: cargo build --release
        working-directory: /tmp/xlang

      # Compile every server (.x -> C) and cc it to an object. The networking
      # preamble (epoll/sendfile/...) is active on Linux, so this is a real
      # compile check. Servers are event loops (run forever) so we don't run them.
      - name: Compile every server (.x -> C -> object)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          mkdir -p build
          pass=0
          for f in servers/*.x; do
            stem=$(basename "$f" .x)
            "$XLANGC" c "$f"
            cc -O2 -c "build/$stem.c" -o "build/$stem.o"
            pass=$((pass + 1))
          done
          echo "::notice::compiled $pass servers (.x -> C -> object) OK"

      - name: Compile the C load generator
        run: cc -O2 -c bench/loadgen.c -o build/loadgen.o

      # Functional test: build server_http, start it, curl it, verify the
      # response. The first RUNTIME CI test for the nginx replacement.
      - name: Functional test - server_http (build, start, curl, verify)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          "$XLANGC" c servers/server_http.x
          cc -O2 -o /tmp/server_http build/server_http.c
          DOCDIR=$(mktemp -d)
          echo "hello from CI" > "$DOCDIR/index.html"
          /tmp/server_http "$DOCDIR" 28099 &
          SRV_PID=$!
          sleep 0.5
          # GET
          body=$(curl -s http://127.0.0.1:28099/index.html)
          [ "$body" = "hello from CI" ] || { echo "FAIL: body=[$body]"; kill $SRV_PID; exit 1; }
          # 404
          code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:28099/nonexistent)
          [ "$code" = "404" ] || { echo "FAIL: 404 code=$code"; kill $SRV_PID; exit 1; }
          # HEAD (status 200, zero body)
          head=$(curl -s -o /dev/null -w '%{http_code} %{size_download}' -I http://127.0.0.1:28099/index.html)
          echo "HEAD: $head"
          # POST upload (write body to a file), then GET it back — round-trip.
          post_body="uploaded content 12345"
          post_code=$(curl -s -o /dev/null -w '%{http_code}' -X POST --data "$post_body" http://127.0.0.1:28099/upload.txt)
          [ "$post_code" = "201" ] || { echo "FAIL: POST code=$post_code"; kill $SRV_PID; exit 1; }
          rb=$(curl -s http://127.0.0.1:28099/upload.txt)
          [ "$rb" = "$post_body" ] || { echo "FAIL: POST roundtrip body=[$rb]"; kill $SRV_PID; exit 1; }
          echo "POST upload + GET roundtrip OK"
          # Large POST (> 64KB, multi-segment) — needs per-connection buffering:
          # the body arrives in TCP segments after the headers. Send via @file
          # (a 200KB --data argv hits E2BIG "Argument list too long" on the runner).
          head -c 200000 /dev/zero | tr '\0' 'x' > /tmp/xl_big.bin
          big_code=$(curl -s -o /dev/null -w '%{http_code}' -X POST --data-binary @/tmp/xl_big.bin http://127.0.0.1:28099/big.txt)
          [ "$big_code" = "201" ] || { echo "FAIL: big POST code=$big_code"; kill $SRV_PID; exit 1; }
          rb_size=$(curl -s http://127.0.0.1:28099/big.txt | wc -c)
          [ "$rb_size" = "200000" ] || { echo "FAIL: big POST roundtrip size=$rb_size (want 200000)"; kill $SRV_PID; exit 1; }
          rm -f /tmp/xl_big.bin
          echo "large POST (200KB, multi-segment) roundtrip OK"
          # PUT (idempotent create/replace, 200), then overwrite + verify, then DELETE.
          put_code=$(curl -s -o /dev/null -w '%{http_code}' -X PUT --data "put-v1" http://127.0.0.1:28099/put.txt)
          [ "$put_code" = "200" ] || { echo "FAIL: PUT code=$put_code"; kill $SRV_PID; exit 1; }
          curl -s -o /dev/null -X PUT --data "put-v2" http://127.0.0.1:28099/put.txt
          pv=$(curl -s http://127.0.0.1:28099/put.txt)
          [ "$pv" = "put-v2" ] || { echo "FAIL: PUT overwrite body=[$pv]"; kill $SRV_PID; exit 1; }
          del_code=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE http://127.0.0.1:28099/put.txt)
          [ "$del_code" = "200" ] || { echo "FAIL: DELETE code=$del_code"; kill $SRV_PID; exit 1; }
          after=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:28099/put.txt)
          [ "$after" = "404" ] || { echo "FAIL: GET after DELETE code=$after"; kill $SRV_PID; exit 1; }
          echo "PUT overwrite + DELETE OK"
          # Conditional request: GET captures the ETag, then If-None-Match → 304.
          etag=$(curl -s -D - -o /dev/null http://127.0.0.1:28099/index.html | tr -d '\r' | awk -F': ' 'tolower($1)=="etag"{print $2}')
          [ -n "$etag" ] || { echo "FAIL: no ETag header"; kill $SRV_PID; exit 1; }
          cond=$(curl -s -o /dev/null -w '%{http_code}' -H "If-None-Match: $etag" http://127.0.0.1:28099/index.html)
          [ "$cond" = "304" ] || { echo "FAIL: If-None-Match code=$cond (etag=$etag)"; kill $SRV_PID; exit 1; }
          echo "ETag + If-None-Match → 304 OK"
          # Conditional request: GET captures Last-Modified, then If-Modified-Since → 304.
          lm=$(curl -s -D - -o /dev/null http://127.0.0.1:28099/index.html | tr -d '\r' | awk -F': ' 'tolower($1)=="last-modified"{print $2}')
          [ -n "$lm" ] || { echo "FAIL: no Last-Modified header"; kill $SRV_PID; exit 1; }
          cond2=$(curl -s -o /dev/null -w '%{http_code}' -H "If-Modified-Since: $lm" http://127.0.0.1:28099/index.html)
          [ "$cond2" = "304" ] || { echo "FAIL: If-Modified-Since code=$cond2 (lm=$lm)"; kill $SRV_PID; exit 1; }
          echo "Last-Modified + If-Modified-Since → 304 OK"
          # CORS: OPTIONS preflight → 204 + Access-Control-Allow-Origin/Methods.
          opt_code=$(curl -s -o /dev/null -w '%{http_code}' -X OPTIONS http://127.0.0.1:28099/index.html)
          [ "$opt_code" = "204" ] || { echo "FAIL: OPTIONS code=$opt_code"; kill $SRV_PID; exit 1; }
          opt_hdrs=$(curl -s -D - -o /dev/null -X OPTIONS http://127.0.0.1:28099/index.html | tr -d '\r')
          echo "$opt_hdrs" | grep -qi '^access-control-allow-origin: \*$' || { echo "FAIL: OPTIONS missing ACAO"; kill $SRV_PID; exit 1; }
          echo "$opt_hdrs" | grep -qi 'access-control-allow-methods:.*OPTIONS' || { echo "FAIL: OPTIONS missing Allow-Methods"; kill $SRV_PID; exit 1; }
          # CORS: a normal GET response carries Access-Control-Allow-Origin.
          get_hdrs=$(curl -s -D - -o /dev/null http://127.0.0.1:28099/index.html | tr -d '\r')
          echo "$get_hdrs" | grep -qi '^access-control-allow-origin: \*$' || { echo "FAIL: GET missing ACAO"; kill $SRV_PID; exit 1; }
          echo "CORS (OPTIONS preflight + ACAO on GET) OK"
          # Directory trailing-slash redirect: GET /sub (a dir) → 301 + Location: /sub/.
          mkdir -p "$DOCDIR/sub"
          echo "in sub" > "$DOCDIR/sub/index.html"
          red_code=$(curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:28099/sub)
          [ "$red_code" = "301" ] || { echo "FAIL: dir redirect code=$red_code"; kill $SRV_PID; exit 1; }
          red_loc=$(curl -s -D - -o /dev/null http://127.0.0.1:28099/sub | tr -d '\r' | awk -F': ' 'tolower($1)=="location"{print $2}')
          [ "$red_loc" = "/sub/" ] || { echo "FAIL: dir redirect Location=$red_loc"; kill $SRV_PID; exit 1; }
          # The slashed path serves the index, and root "/" still works (no redirect loop).
          sub_body=$(curl -s http://127.0.0.1:28099/sub/)
          [ "$sub_body" = "in sub" ] || { echo "FAIL: /sub/ body=[$sub_body]"; kill $SRV_PID; exit 1; }
          echo "directory trailing-slash redirect (301 + Location + /sub/ serves index) OK"
          # Config-driven mode: -c <conf> sets root/listen/index. Run a second
          # instance on another port; GET / must serve the configured index file.
          echo "from config" > "$DOCDIR/home.html"
          printf 'listen 28100;\nroot %s;\nindex home.html;\n' "$DOCDIR" > /tmp/xl.conf
          /tmp/server_http -c /tmp/xl.conf &
          CFG_PID=$!
          sleep 0.5
          cfg_body=$(curl -s http://127.0.0.1:28100/)
          [ "$cfg_body" = "from config" ] || { echo "FAIL: -c config GET / body=[$cfg_body]"; kill $CFG_PID $SRV_PID; exit 1; }
          # The configured root still serves other files normally.
          cfg_other=$(curl -s http://127.0.0.1:28100/index.html)
          [ "$cfg_other" = "hello from CI" ] || { echo "FAIL: -c config /index.html body=[$cfg_other]"; kill $CFG_PID $SRV_PID; exit 1; }
          kill $CFG_PID
          rm -f /tmp/xl.conf
          echo "config-driven (-c root/listen/index, GET / -> home.html) OK"
          # Multi-worker prefork mode (-w N, SO_REUSEPORT): 4 workers on another
          # port; verify it serves, and that 8 concurrent requests all succeed
          # (proving the worker pool — not just one process — handles connections).
          /tmp/server_http "$DOCDIR" 28101 -w 4 &
          WK_PID=$!
          sleep 0.5
          wbody=$(curl -s http://127.0.0.1:28101/index.html)
          [ "$wbody" = "hello from CI" ] || { echo "FAIL: -w GET body=[$wbody]"; kill $WK_PID $SRV_PID; exit 1; }
          fail=0
          for i in $(seq 1 8); do ( curl -s http://127.0.0.1:28101/index.html > /tmp/wk$i.out ) & done
          wait
          for i in $(seq 1 8); do [ "$(cat /tmp/wk$i.out)" = "hello from CI" ] || fail=1; done
          [ "$fail" = 0 ] || { echo "FAIL: -w concurrent requests"; kill $WK_PID $SRV_PID; exit 1; }
          rm -f /tmp/wk*.out
          kill $WK_PID 2>/dev/null
          pkill -P $WK_PID 2>/dev/null
          echo "multi-worker (-w 4, SO_REUSEPORT) serving + 8 concurrent requests OK"
          kill $SRV_PID
          rm -rf "$DOCDIR"
          echo "::notice::server_http functional test passed (GET + 404 + HEAD + large-POST + PUT + DELETE + ETag-304 + LastMod-304 + CORS + dir-redirect + config + multi-worker)"

      # Functional test for the reverse proxy: start a backend, start the proxy,
      # curl through the proxy, verify the response is relayed.
      - name: Functional test - server_proxy (reverse proxy relay)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          "$XLANGC" c servers/server_http.x; cc -O2 -o /tmp/be build/server_http.c
          "$XLANGC" c servers/server_proxy.x; cc -O2 -o /tmp/px build/server_proxy.c
          DOCDIR=$(mktemp -d)
          echo "via proxy" > "$DOCDIR/index.html"
          /tmp/be "$DOCDIR" 28110 &
          BE=$!
          /tmp/px 28120 4 127.0.0.1:28110 &
          PX=$!
          sleep 0.7
          body=$(curl -s http://127.0.0.1:28120/index.html)
          [ "$body" = "via proxy" ] || { echo "FAIL: body=[$body]"; kill $BE $PX; exit 1; }
          kill $BE $PX
          rm -rf "$DOCDIR"
          echo "::notice::server_proxy functional test passed (reverse proxy relay)"

      # Functional test for the vhost path-routing proxy: two backends, route
      # /api/* to one, / to the other. Verifies path-based dispatch.
      - name: Functional test - server_vhost (path routing)
        run: |
          set -e
          XLANGC=/tmp/xlang/target/release/xlangc
          "$XLANGC" c servers/server_http.x; cc -O2 -o /tmp/be build/server_http.c
          "$XLANGC" c servers/server_vhost.x; cc -O2 -o /tmp/vh build/server_vhost.c
          RA=$(mktemp -d); mkdir -p "$RA/api"
          echo "from-api" > "$RA/api/index.html"
          RB=$(mktemp -d)
          echo "from-root" > "$RB/index.html"
          /tmp/be "$RA" 28201 &
          BE1=$!
          /tmp/be "$RB" 28202 &
          BE2=$!
          /tmp/vh 28200 4 /api=127.0.0.1:28201 /=127.0.0.1:28202 &
          VH=$!
          sleep 0.7
          api=$(curl -s http://127.0.0.1:28200/api/index.html)
          [ "$api" = "from-api" ] || { echo "FAIL /api: [$api]"; kill $BE1 $BE2 $VH; exit 1; }
          root=$(curl -s http://127.0.0.1:28200/index.html)
          [ "$root" = "from-root" ] || { echo "FAIL /: [$root]"; kill $BE1 $BE2 $VH; exit 1; }
          kill $BE1 $BE2 $VH
          rm -rf "$RA" "$RB"
          echo "::notice::server_vhost functional test passed (path routing /api vs /)"
