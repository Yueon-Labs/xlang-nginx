# nginx config for fair single-process comparison vs xlang epoll server.
# worker_processes 1 = one process running one epoll loop, same model as
# server_epoll.x. keepalive_requests bumped so nginx doesn't cap each
# connection at 1000 (its default), which would unfairly truncate throughput.
worker_processes 1;
events {
    worker_connections 65535;
}
http {
    access_log off;
    keepalive_timeout 65s;
    keepalive_requests 1000000;
    server {
        listen 28090;
        location / {
            return 200 "hello";
        }
    }
}
